name: Build and deploy Node.js app to Azure Web App - stockvel-backend

on:
  push:
    branches:
      - main
      - feature/group-join-and-details
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm install

      - name: Run backend tests
        run: npm test

      # Option 1: Using Publish Profile (you already have this)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'stockvel-backend'
          package: './server'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
